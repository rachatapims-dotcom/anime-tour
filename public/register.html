<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AnimeTrails JP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-client.js"></script>
    <script src="audit-log.js"></script>
    <script src="auth.js" defer></script>
</head>
<body>
    <header class="top-nav">
        <div class="nav-inner">
            <a class="logo" href="index.html">AnimeTrails JP</a>
            <nav class="menu">
                <a href="index.html">หน้าแรก</a>
                <a href="packages.html">แพ็กเกจทัวร์</a>
                <a href="gallery.html">แกลลอรี่ & รีวิว</a>
                <a href="contact.html">จอง & ติดต่อ</a>
                <a href="team.html">ทีมไกด์</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section-shell" style="max-width:560px; margin:22px auto 0;">
            <p class="eyebrow" style="background:#e8f4ff; color:#0d3b66;">Create Account</p>
            <h1>สมัครสมาชิก</h1>
            <p>สร้างบัญชีใหม่เพื่อจองทัวร์และติดตามข้อมูลการเดินทางของคุณ</p>

            <form id="register-form" class="booking-form" style="grid-template-columns:1fr; margin-top:18px;">
                <div>
                    <label for="register-name">ชื่อแสดงผล</label>
                    <input id="register-name" type="text" placeholder="เช่น Somchai" required>
                </div>
                <div>
                    <label for="register-email">อีเมล (Email)</label>
                    <input id="register-email" type="email" placeholder="your@example.com" required>
                </div>
                <div>
                    <label for="register-password">รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
                    <input id="register-password" type="password" placeholder="••••••••" minlength="6" required>
                </div>
                <div>
                    <label for="register-confirm">ยืนยันรหัสผ่าน</label>
                    <input id="register-confirm" type="password" placeholder="••••••••" minlength="6" required>
                </div>
                <div>
                    <button class="btn btn-primary" type="submit">สมัครสมาชิก</button>
                </div>
            </form>

            <p id="register-error" style="display:none; color:#b42318; font-weight:600; margin-top:10px;"></p>
            <p id="register-success" style="display:none; color:#0d5d22; font-weight:600; margin-top:10px;"></p>

            <div style="margin-top:18px; padding-top:18px; border-top:1px solid var(--line); text-align:center;">
                <p style="color:var(--muted); margin-bottom:8px; font-size:0.92rem;">มีบัญชีอยู่แล้ว?</p>
                <a class="btn btn-ghost" href="login.html" style="color:var(--brand); border-color:var(--brand); background:#fff;">กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </section>
    </main>

    <footer>
        AnimeTrails JP | Register
    </footer>

    <script>
        const registerForm = document.getElementById('register-form');
        const nameInput = document.getElementById('register-name');
        const emailInput = document.getElementById('register-email');
        const passInput = document.getElementById('register-password');
        const confirmInput = document.getElementById('register-confirm');
        const errorText = document.getElementById('register-error');
        const successText = document.getElementById('register-success');

        registerForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            errorText.style.display = 'none';
            successText.style.display = 'none';

            if (!window.sb) {
                errorText.textContent = 'ยังไม่ได้ตั้งค่า Supabase URL/Key ในไฟล์ supabase-config.js';
                errorText.style.display = 'block';
                return;
            }

            const fullName = (nameInput.value || '').trim();
            const email = (emailInput.value || '').trim().toLowerCase();
            const password = (passInput.value || '').trim();
            const confirm = (confirmInput.value || '').trim();

            if (password !== confirm) {
                errorText.textContent = 'รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน';
                errorText.style.display = 'block';
                return;
            }

            const { data, error } = await window.sb.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: fullName }
                }
            });

            if (error) {
                await window.writeSystemLog?.(
                    'auth.register.failed',
                    'warn',
                    'Register failed',
                    { email }
                );
                errorText.textContent = error.message;
                errorText.style.display = 'block';
                return;
            }

            if (data.user && data.session) {
                await window.sb.from('profiles').upsert({
                    id: data.user.id,
                    full_name: fullName,
                    role: 'user'
                });
            }

            await window.writeSystemLog?.(
                'auth.register.success',
                'info',
                'Register success',
                { email }
            );

            successText.textContent = 'สมัครสมาชิกสำเร็จ กรุณาเช็กอีเมลยืนยัน (ถ้ามี) แล้วเข้าสู่ระบบ';
            successText.style.display = 'block';
            registerForm.reset();
        });
    </script>
</body>
</html>
